<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปข้อความ & Admin Dashboard - Prompt Font</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background: #f4f7f9; 
            padding: 30px; 
            color: #333; 
        }
        .container { max-width: 900px; margin: 0 auto 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h3 { font-weight: 600; text-align: center; color: #007bff; }
        h3 { text-align: left; margin-top: 0; }
        
        /* Stats & Main Controls */
        .stats { margin-bottom: 20px; font-size: 1.1rem; font-weight: 400; color: #555; display: flex; justify-content: space-between; align-items: center; background: #eef2f5; padding: 15px; border-radius: 10px; }
        .btn-group { display: flex; gap: 10px; }
        
        /* Table Style */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-family: 'Prompt', sans-serif; }
        th { background-color: #007bff; color: white; font-weight: 400; }
        tr:hover { background-color: #f9f9f9; }
        
        .time { color: #888; font-size: 0.85rem; width: 100px; }
        .msg-text { font-weight: 400; }
        
        /* Buttons */
        .btn { font-family: 'Prompt', sans-serif; padding: 8px 15px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; transition: 0.3s; font-size: 14px; }
        .btn-delete { background: #ff4d4d; color: white; }
        .btn-delete:hover { background: #cc0000; }
        .btn-clear-display { background: #ffcc00; color: #333; }
        .btn-clear-display:hover { background: #e6b800; }
        .btn-reset { background: #666; color: white; }
        .btn-reset:hover { background: #444; }

        /* Custom Bad Word Section */
        .badword-panel { border-top: 4px solid #ff4d4d; }
        .badword-input-group { display: flex; gap: 10px; margin: 15px 0; }
        .badword-input { font-family: 'Prompt', sans-serif; flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .word-tag { background: #ffebeb; border: 1px solid #ffcccc; color: #d00000; padding: 5px 12px; border-radius: 20px; font-size: 14px; display: flex; align-items: center; gap: 8px; font-weight: 400; }
        .remove-tag { cursor: pointer; font-weight: bold; color: #ff4d4d; }

        .action-col { width: 80px; text-align: center; }
        
        /* Highlight ยอดรวม */
        #count { color: #007bff; font-size: 1.4rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 สรุปข้อความทั้งหมด</h1>
    <div class="stats">
        <span>จำนวนข้อความทั้งหมด: <span id="count">0</span> ข้อความ</span>
        <div class="btn-group">
            <button class="btn btn-clear-display" onclick="triggerClearDisplay()">🧹 ล้างจอ (Display Only)</button>
            <button class="btn btn-reset" onclick="resetSystem()">♻️ ล้างฐานข้อมูล</button>
        </div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>เวลา</th>
                <th>ข้อความ</th>
                <th class="action-col">จัดการ</th>
            </tr>
        </thead>
        <tbody id="message-list"></tbody>
    </table>
</div>

<div class="container badword-panel">
    <h3>🚫 เพิ่มคำหยาบที่ต้องการบล็อกเพิ่มเติม</h3>
    <p style="font-size: 13px; color: #666; font-weight: 300;">คำที่เพิ่มที่นี่จะถูกส่งไปบล็อกในหน้าส่งข้อความทันที</p>
    <div class="badword-input-group">
        <input type="text" id="newBadWord" class="badword-input" placeholder="พิมพ์คำที่ต้องการบล็อกที่นี่...">
        <button class="btn btn-delete" onclick="addCustomBadWord()">+ เพิ่มคำสั่งบล็อก</button>
    </div>
    <div class="tag-container" id="custom-words-tags"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyABMGE0Mt3KaLK6P5mv33hP7G_6TVPJAJk",
        authDomain: "experimental-film-9bd72.firebaseapp.com",
        databaseURL: "https://experimental-film-9bd72-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "experimental-film-9bd72",
        storageBucket: "experimental-film-9bd72.firebasestorage.app",
        messagingSenderId: "971518484827",
        appId: "1:971518484827:web:54fbdb1d3354a2e1fbba7e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const listTable = document.getElementById('message-list');
    const countDisplay = document.getElementById('count');

    // ส่วนจัดการข้อความสะสม
    onValue(ref(db, 'messages'), (snapshot) => {
        listTable.innerHTML = ""; 
        let count = 0;
        const data = snapshot.val();
        if (data) {
            const entries = Object.entries(data).reverse(); 
            count = entries.length;
            entries.forEach(([key, msg]) => {
                const row = document.createElement('tr');
                const date = new Date(msg.timestamp);
                const timeStr = date.toLocaleTimeString('th-TH');
                row.innerHTML = `
                    <td class="time">${timeStr}</td>
                    <td class="msg-text">${msg.text}</td>
                    <td class="action-col"><button class="btn btn-delete" onclick="deleteMessage('${key}')">ลบ</button></td>
                `;
                listTable.appendChild(row);
            });
        }
        // อัปเดตตัวเลขรวมสะสม
        countDisplay.innerText = count.toLocaleString();
    });

    // ส่วนจัดการคำหยาบ (Custom)
    window.addCustomBadWord = function() {
        const input = document.getElementById('newBadWord');
        const word = input.value.trim();
        if (word) {
            push(ref(db, 'badWordsCustom'), word).then(() => {
                input.value = "";
            });
        }
    };

    onValue(ref(db, 'badWordsCustom'), (snapshot) => {
        const tagContainer = document.getElementById('custom-words-tags');
        tagContainer.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            Object.entries(data).forEach(([key, word]) => {
                const div = document.createElement('div');
                div.className = 'word-tag';
                div.innerHTML = `${word} <span class="remove-tag" onclick="removeCustomBadWord('${key}')">×</span>`;
                tagContainer.appendChild(div);
            });
        }
    });

    window.removeCustomBadWord = function(key) {
        if(confirm("ยกเลิกการบล็อกคำนี้ใช่หรือไม่?")) {
            remove(ref(db, `badWordsCustom/${key}`));
        }
    };

    window.deleteMessage = function(key) {
        if (confirm("ลบข้อความนี้ออกจากหน้าจอใช่หรือไม่?")) {
            remove(ref(db, `messages/${key}`));
        }
    };

    window.resetSystem = function() {
        if (confirm("🚨 ลบข้อมูลถาวรทั้งหมด? ข้อมูลในหน้านี้จะหายไปทั้งหมดและเริ่มนับ 0 ใหม่")) {
            remove(ref(db, 'messages'));
        }
    };

    window.triggerClearDisplay = function() {
        set(ref(db, 'commands/clear'), Date.now());
    };
</script>
</body>
</html>
